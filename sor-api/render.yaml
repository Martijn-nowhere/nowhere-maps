services:
  - type: web
    name: sor-curriculum-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /data/sor.db
      - key: SOR_MASTER_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SYSTEME_IO_API_KEY
        sync: false
      - key: INSTANTLY_WEBHOOK_SECRET
        sync: false
    disk:
      name: sor-data
      mountPath: /data
      sizeGB: 1
